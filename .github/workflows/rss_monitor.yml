name: RSS Monitor

on:
  # 스케줄: 매일 09:00, 18:00 KST (00:00, 09:00 UTC)
  schedule:
    - cron: "0 0,9 * * *" # UTC 기준

  # 수동 실행 가능
  workflow_dispatch:

jobs:
  check-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run multi-site monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          python multi_site_monitor.py

      - name: Commit and push state file if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add last_checked.json || true
          if ! git diff --staged --quiet; then
            git commit -m "Update last checked state [skip ci]"
            git push
          fi
